<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Timii</title>
    <style>
      html, body { height: 100%; margin: 0; background: #080D0F; color: #e8edf2; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .wrap { height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
      .card { max-width: 360px; width: 100%; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; background: rgba(255,255,255,0.03); }
      .title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
      .desc { font-size: 14px; opacity: 0.75; margin: 0 0 16px; }
      .btn { display: inline-block; padding: 10px 14px; border-radius: 999px; border: 1px solid rgba(45,212,168,0.35); color: #2dd4a8; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <p class="title">当前离线</p>
        <p class="desc">网络恢复后会自动更新</p>
        <a class="btn" href="/">返回首页</a>
      </div>
    </div>
  </body>
</html>
